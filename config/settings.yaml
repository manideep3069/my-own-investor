# Committed default settings. Override locally in config/settings.local.yaml (gitignored)
# and put secrets in .env (prefixed MOI_, e.g. MOI_QUIVER_API_KEY=...).

log_level: INFO
log_json: false

# Market the pipeline tracks: us (config/universe.yaml) or india (config/universe_india.yaml).
# The dashboard's $/₹ toggle is display-only and independent of this.
region: us

price_history_years: 6

ibkr:
  host: 127.0.0.1
  port: 7497        # TWS paper. IB Gateway paper = 4002. Live = 7496 / 4001.
  client_id: 17
  readonly: true    # Phase 0: connection is read-only; no orders possible.
